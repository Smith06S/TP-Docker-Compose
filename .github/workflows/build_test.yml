name: Build and Test Application
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build python image for scanning
        run: docker build -t my-app-python:1.0.0 -f api/Dockerfile .
      - name: Build mongo image for scanning
        run: docker build -t my-app-mongo:1.0.0 -f mongo/Dockerfile .
