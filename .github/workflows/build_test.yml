name: Build and Test Application
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Login in Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Python for scanning
        run: docker build -t my-app-python:1.0.0 -f ./api/Dockerfile ./api
      - name: Build Mongo for scanning
        run: docker build -t my-app-mongo:1.0.0 -f ./mongo/Dockerfile ./mongo
      - name: Docker Scout Scan Python
        uses: docker/scout-action@v1
        with:
          command: cves, recommendations
          image: my-app-python:1.0.0
          file: ./api/Dockerfile
          only-severities: critical,high
          exit-code: false
          only-update: true
      - name : Docker Scout Scan Mongo
        uses: docker/scout-action@v1
        with:
          command: cves, recommendations
          image: my-app-mongo:1.0.0
          file: ./mongo/Dockerfile
          only-severities: critical,high
          exit-code: false
          only-update: true
      - name: Generate .env
        run: |
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=${{ vars.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ vars.MYSQL_DATABASE }}
          MYSQL_USER=${{ vars.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          EOF
        shell: bash
      - name: Build the stack
        run: docker compose up -d
      - name: Docker ps
        run: docker compose ps
