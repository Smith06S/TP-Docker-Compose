name: Build and Test Application
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build python image for scanning
        run: docker build -t my-app-python:1.0.0 -f ./api/Dockerfile ./api
      - name: Build mongo image for scanning
        run: docker build -t my-app-mongo:1.0.0 -f ./mongo/Dockerfile ./mongo
      - name: Docker Scout Scan python
        uses: docker/scout-cation@v1
        with:
          command: cves
          image: my-app-python:1.0.0
          file: ./api/Dockerfile
          only-severities: critical, high
          exit-code: true
      - name: Docker Scout Scan mongo
        uses: docker/scout-cation@v2
        with:
          command: cves
          image: my-app-mongo:1.0.0
          file: ./mongo/Dockerfile
          only-severities: critical, high
          exit-code: true
