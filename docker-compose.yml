services:
  db_mysql:
    image: mysql:8.0
    container_name: db_mysql
    restart: on-failure
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: "mysql -uroot -p$MYSQL_ROOT_PASSWORD -e 'USE $MYSQL_DATABASE;' || exit 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    networks:
      - backend

  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: db_mongo
    restart: on-failure
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    healthcheck:
      test: mongo --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "if(db.getSiblingDB('blog_db').posts.count() !== 5){ quit(1) }"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  admin_mysql:
    image: adminer
    container_name: admin_mysql
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
    ports:
      - 8080:8080
    healthcheck:
      test: "curl -f http://localhost:8080 || exit 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - backend

  admin_mongo:
    image: mongo-express
    container_name: admin_mongo
    restart: on-failure
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@db_mongo:27017/
    depends_on:
      db_mongo:
        condition: service_healthy
    ports:
      - 8081:8081
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    container_name: api
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    environment:
      - MYSQL_HOST=db_mysql
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MONGO_HOST=db_mongo
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - 8000:8000
    healthcheck:
      test: "curl -f http://localhost:8000/posts || exit 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - backend

volumes:
  db_data:
  mongo_data:

networks:
  backend:
    driver: bridge